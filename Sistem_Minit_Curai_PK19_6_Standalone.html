<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Minit Curai PK19/6 (Standalone)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .animate-in { animation: fadeIn 0.3s ease-out; }
      .loader { border-top-color: #d97706; animation: spinner 1.5s linear infinite; }
      @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .logo-blend { mix-blend-mode: multiply; }
    </style>
    <!-- Load UMD builds of React, ReactDOM, and jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
</head>
<body class="bg-orange-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = window.React || React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbyM43TxNqnzI_9sI6qE5c5b2Fb_igTktbYE9K_4LYotTzNpi3s-D-J-EnwD87oceoIW/exec"; 

        const Icons = {
          Plus: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
          Trash2: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
          FileText: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>,
          UploadCloud: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path><polyline points="16 16 12 12 8 16"></polyline></svg>,
          User: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
          Calendar: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
          Clock: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
          MapPin: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>,
          Building: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="9" y1="22" x2="9" y2="16"></line><line x1="15" y1="22" x2="15" y2="16"></line><line x1="9" y1="16" x2="15" y2="16"></line><path d="M8 6h2v2H8V6zm4 0h2v2h-2V6zm4 0h2v2h-2V6zM8 11h2v2H8v-2zm4 0h2v2h-2v-2zm4 0h2v2h-2v-2z"></path></svg>,
          Hash: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line><line x1="10" y1="3" x2="8" y2="21"></line><line x1="16" y1="3" x2="14" y2="21"></line></svg>,
          ClipboardList: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><line x1="9" y1="12" x2="10" y2="12"></line><line x1="14" y1="12" x2="15" y2="12"></line><line x1="9" y1="16" x2="10" y2="16"></line><line x1="14" y1="16" x2="15" y2="16"></line></svg>,
          CheckCircle: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,
          AlertCircle: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
          RefreshCw: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>,
          Download: (props) => <svg className={props.className || "w-5 h-5"} xmlns="http://www.w3.org/2000/svg" width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        };

        const generatePDF = (data, outputType = 'base64') => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const margin = 15;
            const pageWidth = doc.internal.pageSize.getWidth();
            const contentWidth = pageWidth - (margin * 2);
            
            doc.setFont('Helvetica', 'normal').setFontSize(8);
            doc.text('PK19 – Pengurusan Sukan Dan Permainan', pageWidth - margin, 10, { align: 'right' });
            doc.line(margin, 12, pageWidth - margin, 12);
            doc.setFont('Helvetica', 'bold').setFontSize(11);
            doc.text('PK19/6', pageWidth - margin, 18, { align: 'right' });
            doc.setFontSize(12).text('MINIT CURAI', pageWidth / 2, 25, { align: 'center' });

            const gridStartY = 30;
            const rowHeight = 7;
            const colWidth = contentWidth / 2;
            doc.setFontSize(10).setFont('Helvetica', 'normal');

            const drawRow = (y, l1, v1, l2, v2) => {
                const maxValWidth = colWidth - 28;
                const lines1 = doc.splitTextToSize(v1 || '', maxValWidth);
                const lines2 = doc.splitTextToSize(v2 || '', maxValWidth);
                const h = Math.max(rowHeight, (Math.max(lines1.length, lines2.length) * 4.5) + 2);

                doc.rect(margin, y, colWidth, h);
                doc.setFont('Helvetica', 'bold').text(l1, margin + 2, y + 5);
                doc.setFont('Helvetica', 'normal').text(lines1, margin + 25, y + 5);
                
                doc.rect(margin + colWidth, y, colWidth, h);
                doc.setFont('Helvetica', 'bold').text(l2, margin + colWidth + 2, y + 5);
                doc.setFont('Helvetica', 'normal').text(lines2, margin + colWidth + 25, y + 5);
                return h;
            };

            const formatDate = (dStr) => {
                if (!dStr) return '';
                const d = new Date(dStr);
                return d.toLocaleDateString('ms-MY', { day: '2-digit', month: '2-digit', year: 'numeric' });
            };

            let currentY = gridStartY;
            currentY += drawRow(currentY, 'PERKARA', data.perkara, 'TARIKH', formatDate(data.tarikh));
            currentY += drawRow(currentY, 'RUJ. FAIL', data.rujukanFail, 'MASA', data.masaMula + ' - ' + data.masaTamat);
            currentY += drawRow(currentY, 'TEMPAT', data.tempat, 'ANJURAN', data.anjuran);

            const attY = currentY;
            doc.rect(margin, attY, contentWidth, rowHeight * 2);
            doc.setFont('Helvetica', 'bold').text('KEHADIRAN :', margin + 2, attY + 5);
            doc.setFont('Helvetica', 'normal').text('', margin + 30, attY + 5);

            doc.autoTable({
                startY: attY + (rowHeight * 2),
                margin: { left: margin, right: margin },
                head: [['BIL', 'PERKARA / ISU', 'TINDAKAN / MAKLUMAN']],
                body: data.issues.map((iss, i) => [(i + 1).toString(), iss.perkara, iss.tindakan]),
                theme: 'plain',
                styles: { font: 'Helvetica', fontSize: 10, cellPadding: 3, lineColor: [0,0,0], lineWidth: 0.1 },
                headStyles: { fontStyle: 'bold', halign: 'center' },
                columnStyles: { 0: { cellWidth: 12, halign: 'center' }, 1: { cellWidth: (contentWidth - 12) * 0.7 }, 2: { cellWidth: (contentWidth - 12) * 0.3 } },
            });

            const finalY = doc.lastAutoTable.finalY + 5;
            doc.rect(margin, finalY, colWidth, 15);
            doc.setFont('Helvetica', 'normal').text('Nama Pencatat :', margin + 2, finalY + 5);
            doc.setFont('Helvetica', 'bold').text(data.pencatat || '', margin + 2, finalY + 11);

            doc.rect(margin + colWidth, finalY, colWidth, 15);
            doc.setFont('Helvetica', 'normal').text('Tarikh Disediakan :', margin + colWidth + 2, finalY + 5);
            doc.setFont('Helvetica', 'bold').text(formatDate(data.tarikhDisediakan) || '', margin + colWidth + 2, finalY + 11);

            const ph = doc.internal.pageSize.getHeight();
            doc.setFontSize(7).setFont('Helvetica', 'normal');
            doc.line(margin, ph - 20, pageWidth - margin, ph - 20);
            doc.text('Hak Cipta Terpelihara © Sektor Jaminan Kualiti, Jabatan Pendidikan Negeri Johor', margin, ph - 15);
            doc.text('01 Januari 2018 - Keluaran 01 | Pindaan 00', margin, ph - 11);

            if (outputType === 'base64') {
                return doc.output('datauristring').split(',')[1];
            }
            return doc;
        };

        const FormField = ({ label, icon, children }) => (
            <div className="flex flex-col gap-2">
                <label className="text-sm font-semibold text-amber-700 flex items-center gap-2">
                    {icon} {label}
                </label>
                {children}
            </div>
        );

        const App = () => {
            const getToday = () => new Date().toISOString().split('T')[0];
            const getTomorrow = () => new Date(new Date().getTime() + 86400000).toISOString().split('T')[0];

            const initialData = {
                perkara: '',
                tarikh: getToday(),
                rujukanFail: '-',
                masaMula: '08:00',
                masaTamat: '11:00',
                tempat: '',
                anjuran: '',
                kehadiran: '',
                pencatat: '',
                tarikhDisediakan: getTomorrow(),
                issues: [{ id: Math.random().toString(), perkara: '', tindakan: '' }]
            };

            const [data, setData] = useState(initialData);
            const [loading, setLoading] = useState(false);
            const [isSent, setIsSent] = useState(false);
            const [status, setStatus] = useState(null);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                if (name === 'tarikh') {
                    const nextDay = new Date(new Date(value).getTime() + 86400000).toISOString().split('T')[0];
                    setData(prev => ({ ...prev, tarikh: value, tarikhDisediakan: nextDay }));
                } else if (name === 'masaMula') {
                    const [h, m] = value.split(':').map(Number);
                    const d = new Date(); d.setHours(h + 3, m);
                    const newT = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
                    setData(prev => ({ ...prev, masaMula: value, masaTamat: newT }));
                } else {
                    setData(prev => ({ ...prev, [name]: value }));
                }
            };

            const addIssue = () => setData(prev => ({ ...prev, issues: [...prev.issues, { id: Math.random().toString(), perkara: '', tindakan: '' }] }));
            const removeIssue = (id) => data.issues.length > 1 && setData(prev => ({ ...prev, issues: prev.issues.filter(i => i.id !== id) }));
            const updateIssue = (id, f, v) => setData(prev => ({ ...prev, issues: prev.issues.map(i => i.id === id ? { ...i, [f]: v } : i) }));

            const handleReset = () => {
                setData(initialData);
                setIsSent(false);
                setStatus(null);
                setLoading(false);
            };

            const handleJanaPDF = () => {
                if (!data.perkara || !data.pencatat) {
                    setStatus({ type: 'error', message: 'Sila lengkapkan Nama dan Perkara sebelum menjana PDF.' });
                    return;
                }
                const doc = generatePDF(data, 'doc');
                const filename = 'Minit_Curai_' + data.perkara.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.pdf';
                doc.save(filename);
            };

            const handleHantarDrive = async () => {
                if (!data.perkara || !data.pencatat) {
                    setStatus({ type: 'error', message: 'Sila lengkapkan Nama dan Perkara sebelum menghantar.' });
                    return;
                }

                setLoading(true);
                setStatus({ type: 'info', message: 'Minit Curai sedang dihantar ke Google Drive...' });

                try {
                    const pdfBase64 = generatePDF(data, 'base64');
                    const filename = 'Minit_Curai_' + data.perkara.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.pdf';
                    
                    await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            pdfData: pdfBase64,
                            fileName: filename
                        })
                    });

                    setStatus({ type: 'success', message: 'Minit Curai berjaya disimpan ke folder Google Drive!' });
                    setIsSent(true);
                } catch (err) {
                    console.error(err);
                    setStatus({ type: 'error', message: 'Gagal menghantar ke Drive. Sila semak sambungan internet anda.' });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-4xl mx-auto py-10 px-4">
                    <header className="mb-10 text-center">
                        <img 
                            src="https://i.postimg.cc/LXs7gmYk/logo-sekolah.jpg" 
                            alt="Logo Sekolah" 
                            className="mx-auto h-32 w-auto mb-6 drop-shadow-md logo-blend"
                        />
                        <h1 className="text-3xl font-bold text-amber-900">Sistem Penjana Minit Curai</h1>
                    </header>

                    {status && (
                        <div className={"mb-6 p-4 rounded-xl flex items-center gap-3 animate-in shadow-sm border " + (
                            status.type === 'success' ? 'bg-green-100 text-green-800 border-green-200' : 
                            status.type === 'info' ? 'bg-amber-100 text-amber-800 border-amber-200' :
                            'bg-red-100 text-red-800 border-red-200'
                        )}>
                            {status.type === 'success' ? <Icons.CheckCircle className="flex-shrink-0" /> : status.type === 'info' ? <Icons.RefreshCw className="flex-shrink-0 animate-spin" /> : <Icons.AlertCircle className="flex-shrink-0" />}
                            <span className="font-medium">{status.message}</span>
                        </div>
                    )}

                    <main className="bg-white rounded-2xl shadow-xl border border-amber-100 overflow-hidden">
                        <div className="p-8 bg-gradient-to-br from-amber-50 to-white border-b border-amber-100">
                            <h2 className="text-lg font-semibold text-amber-800 mb-6 flex items-center gap-2"><Icons.ClipboardList className="w-5 h-5" /> Maklumat Utama</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="md:col-span-2">
                                    <FormField label="Nama" icon={<Icons.User size={18} />}>
                                        <input type="text" name="pencatat" value={data.pencatat} onChange={handleInputChange} className="w-full px-4 py-2 rounded-lg border border-amber-200 focus:ring-2 focus:ring-amber-400 outline-none" placeholder="Nama anda" />
                                    </FormField>
                                </div>
                                <FormField label="Perkara" icon={<Icons.FileText size={18} />}><input type="text" name="perkara" value={data.perkara} onChange={handleInputChange} className="w-full px-4 py-2 rounded-lg border border-amber-200 focus:ring-2 focus:ring-amber-400 outline-none" placeholder="Tajuk acara" /></FormField>
                                <FormField label="Tarikh" icon={<Icons.Calendar size={18} />}><input type="date" name="tarikh" value={data.tarikh} onChange={handleInputChange} className="w-full px-4 py-2 rounded-lg border border-amber-200 focus:ring-2 focus:ring-amber-400 outline-none" /></FormField>
                                <FormField label="Rujukan Fail" icon={<Icons.Hash size={18} />}><input type="text" name="rujukanFail" value={data.rujukanFail} onChange={handleInputChange} className="w-full px-4 py-2 rounded-lg border border-amber-200 focus:ring-2 focus:ring-amber-400 outline-none" /></FormField>
                                <div className="grid grid-cols-2 gap-4">
                                    <FormField label="Masa Mula" icon={<Icons.Clock size={18} />}><input type="time" name="masaMula" value={data.masaMula} onChange={handleInputChange} className="w-full px-4 py-2 rounded-lg border border-amber-200 focus:ring-2 focus:ring-amber-400 outline-none" /></FormField>
                                    <FormField label="Masa Tamat" icon={<Icons.Clock size={18} />}><input type="time" name="masaTamat" value={data.masaTamat} onChange={handleInputChange} className="w-full px-4 py-2 rounded-lg border border-amber-200 focus:ring-2 focus:ring-amber-400 outline-none" /></FormField>
                                </div>
                                <FormField label="Tempat" icon={<Icons.MapPin size={18} />}><input type="text" name="tempat" value={data.tempat} onChange={handleInputChange} className="w-full px-4 py-2 rounded-lg border border-amber-200 focus:ring-2 focus:ring-amber-400 outline-none" /></FormField>
                                <FormField label="Anjuran" icon={<Icons.Building size={18} />}><input type="text" name="anjuran" value={data.anjuran} onChange={handleInputChange} className="w-full px-4 py-2 rounded-lg border border-amber-200 focus:ring-2 focus:ring-amber-400 outline-none" /></FormField>
                            </div>
                        </div>

                        <div className="p-8">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-lg font-semibold text-amber-800">Perkara / Isu dan Tindakan</h2>
                                <button onClick={addIssue} className="flex items-center gap-2 px-4 py-2 bg-amber-500 text-white rounded-lg hover:bg-amber-600 transition-colors shadow-sm"><Icons.Plus size={18} /> Tambah Isu</button>
                            </div>
                            <div className="space-y-4">
                                {data.issues.map((iss, idx) => (
                                    <div key={iss.id} className="group relative flex flex-col md:flex-row gap-4 p-4 rounded-xl border border-amber-100 bg-amber-50/30 hover:bg-amber-50/50 transition-colors">
                                        <div className="w-8 h-8 bg-amber-100 text-amber-700 rounded-full flex items-center justify-center font-bold flex-shrink-0">{idx + 1}</div>
                                        <div className="flex-grow space-y-3">
                                            <textarea value={iss.perkara} onChange={(e) => updateIssue(iss.id, 'perkara', e.target.value)} placeholder="Perkara / Isu" className="w-full px-3 py-2 rounded-lg border border-amber-200 focus:ring-2 focus:ring-amber-400 outline-none min-h-[60px]" />
                                            <textarea value={iss.tindakan} onChange={(e) => updateIssue(iss.id, 'tindakan', e.target.value)} placeholder="Tindakan / Makluman (Kosongkan jika tiada)" className="w-full px-3 py-2 rounded-lg border border-amber-200 focus:ring-2 focus:ring-amber-400 outline-none min-h-[60px]" />
                                        </div>
                                        <button onClick={() => removeIssue(iss.id)} className="p-2 text-red-400 hover:text-red-600 transition-colors self-start md:self-center"><Icons.Trash2 size={20} /></button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="p-8 border-t border-amber-100 bg-amber-50/20 text-center flex flex-col md:flex-row justify-center items-center gap-4">
                            {!isSent ? (
                                <>
                                    <button 
                                        onClick={handleJanaPDF} 
                                        className="flex items-center gap-3 px-10 py-4 bg-amber-600 text-white rounded-2xl font-bold text-lg hover:bg-amber-700 transition-all shadow-xl shadow-amber-200 transform active:scale-95"
                                    >
                                        <Icons.FileText size={24} />
                                        Jana PDF
                                    </button>
                                    <button 
                                        onClick={handleHantarDrive} 
                                        disabled={loading}
                                        className="flex items-center gap-3 px-10 py-4 bg-emerald-600 text-white rounded-2xl font-bold text-lg hover:bg-emerald-700 transition-all shadow-xl shadow-emerald-200 disabled:opacity-50 transform active:scale-95"
                                    >
                                        {loading ? (
                                            <div className="w-6 h-6 border-3 border-white border-t-transparent rounded-full animate-spin"></div>
                                        ) : (
                                            <Icons.UploadCloud size={24} />
                                        )}
                                        Hantar ke Drive
                                    </button>
                                </>
                            ) : (
                                <button 
                                    onClick={handleReset} 
                                    className="flex items-center gap-3 px-12 py-5 bg-emerald-600 text-white rounded-2xl font-bold text-lg hover:bg-emerald-700 transition-all shadow-xl shadow-emerald-100 transform active:scale-95 animate-in"
                                >
                                    <Icons.Plus size={24} />
                                    Tambah Rekod Baru
                                </button>
                            )}
                        </div>
                    </main>
                    
                    <footer className="mt-10 text-center text-amber-700/60 text-sm">
                        <p>Rekod boleh dijana sebagai PDF atau dihantar ke Google Drive</p>
                        <p>Hak Cipta Terpelihara &copy; {new Date().getFullYear()} - Format PK19/6</p>
                    </footer>
                </div>
            );
        };

        const root = (window.ReactDOM || ReactDOM).createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
